  populace_validation:
    status: blocked
    dataset: populace-us-2024 local H5
    command: >-
      AXIOM_POPULACE_US_2024_H5=/Users/maxghenis/.codex-artifacts/populace-us-fiscal-refresh-703bd81-no-oos-20260620/artifacts/populace_us_2024.h5
