    Colorado AND-CS grant-payment rules are encoded and wired to PolicyEngine's CO state-supplement surface. Populace
    validation is currently blocked by PolicyEngine-US parameter drift: PE-US 1.751.2 carries the 2025 monthly grant standard
    of $967 into 2026, while 9 CCR 2503-5 3.546 sets $994 effective January 1, 2026. The upstream PE fix is
