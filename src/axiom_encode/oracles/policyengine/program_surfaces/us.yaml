      --with /Users/maxghenis/PolicyEngine/populace/packages/populace-data[us]
      --with numpy --with pandas axiom-encode us-populace-compare
      --root /Users/maxghenis/TheAxiomFoundation
      --rulespec-root /Users/maxghenis/TheAxiomFoundation/rulespec-us
      --axiom-rules-engine-path /Users/maxghenis/TheAxiomFoundation/_worktrees/axiom-rules-engine-derived-versions-20260701
      --year 2026 --month 1 --populace-year 2024
      --variable co_state_supplement --sample-size 0 --max-differences 10
    last_run: '2026-07-01'
    rationale: >-
      Full Colorado Populace run compared 2,209 people and found 1 mismatch, exactly $27/month: RuleSpec applies
      the 2026 source-law AND-CS grant standard of $994, while PolicyEngine-US 1.751.2 still uses $967 for 2026.
      Installing local PE branch codex/co-ssi-2026-params from PolicyEngine/policyengine-us#8807 removes the mismatch;
      the paired CO OAP/AND-CS Populace run compared 4,418 values with 0 mismatches.
