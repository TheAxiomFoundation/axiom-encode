name: Provision selftest

# Proves scripts/provision_verification_supervisor.py builds a runtime whose
# launcher maps no file from the source prefix and pins libpython to the runtime,
# on the hosted Ubuntu image — the environment where the rulespec signed-apply
# workflows run it. The hosted toolcache CPython is --enable-shared with an
# absolute RUNPATH into the (user-writable) toolcache, so without the relocation
# pass a copied runtime keeps mapping libpython from the original location. This
# job re-derives the assertions independently of the provisioner's own internal
# checks, and exercises the fail-closed paths.

on:
  push:
    branches: [main]
    paths:
      - scripts/provision_verification_supervisor.py
      - .github/workflows/provision-selftest.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/provision_verification_supervisor.py
      - .github/workflows/provision-selftest.yml

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false  # one version's failure must not mask the other's
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        id: py
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install patchelf
        run: sudo apt-get -yq install patchelf

      - name: Stage site-packages and a stand-in supervisor
        env:
          PYBIN: ${{ steps.py.outputs.python-path }}
        run: |
          set -euo pipefail
          "$PYBIN" -m pip install --quiet --target "$RUNNER_TEMP/staged" pyyaml
          # Hostile staged content: the provisioner must purge startup hooks
          # AFTER the site-packages swap, or these execute at every launcher
          # start (-I still runs site-packages .pth lines and imports the
          # sitecustomize MODULE — package/.pyc/.so forms, not just the .py).
          marker="$RUNNER_TEMP/pth-executed"
          echo "import os; open('$marker', 'w').close()" > "$RUNNER_TEMP/staged/evil.pth"
          echo "import site" > "$RUNNER_TEMP/staged/python._pth"
          printf 'open(%s, "w").close()\n' "'$marker'" > "$RUNNER_TEMP/staged/usercustomize.py"
          mkdir "$RUNNER_TEMP/staged/sitecustomize"
          printf 'import os; os.close(os.open(%s, os.O_CREAT | os.O_WRONLY))\n' "'$marker'" \
            > "$RUNNER_TEMP/staged/sitecustomize/__init__.py"
          install -m 755 /bin/true "$RUNNER_TEMP/fake-supervisor"
          # The RPATH-relocation claims below are only meaningful against a
          # shared-libpython build; fail loudly if the toolcache goes static.
          src_prefix="$("$PYBIN" -c 'import sys; print(sys.base_prefix)')"
          ls "$src_prefix"/lib/libpython*.so* >/dev/null

      - name: Provision as root via the resolved interpreter (production shape)
        env:
          PYBIN: ${{ steps.py.outputs.python-path }}
        run: |
          set -euo pipefail
          case "$PYBIN" in
            "$RUNNER_TOOL_CACHE"/Python/*) ;;
            *) echo "resolved interpreter is not the toolcache python: $PYBIN"; exit 1 ;;
          esac
          sudo "$PYBIN" -I -S scripts/provision_verification_supervisor.py \
            --destination "$RUNNER_TEMP/dest" \
            --supervisor "$RUNNER_TEMP/fake-supervisor" \
            --site-packages "$RUNNER_TEMP/staged" \
            --apply-root test-apply-root \
            --eval-root test-eval-root \
            --corpus-release-root test-corpus-root \
            --git /usr/bin/git \
            --require-prefix-under "$RUNNER_TOOL_CACHE/Python" \
            --patchelf /usr/bin/patchelf

      - name: Independently assert the launcher maps nothing from the source prefix
        env:
          PYBIN: ${{ steps.py.outputs.python-path }}
        run: |
          set -euo pipefail
          dest="$RUNNER_TEMP/dest"
          interp="$(sed -n '1s/^#!\([^ ]*\).*/\1/p' "$dest/axiom-encode")"
          echo "launcher interpreter: $interp"
          case "$interp" in "$dest"/python/*) ;; *) echo "launcher points outside the runtime"; exit 1 ;; esac
          env -i \
            PATH="$dest" \
            HOME="$dest/python" \
            GIT_CONFIG_GLOBAL=/dev/null \
            GIT_CONFIG_NOSYSTEM=1 \
            git -C "$GITHUB_WORKSPACE" rev-parse --show-toplevel >/dev/null
          # Probe in LAUNCHER mode (-I, site enabled — a surviving .pth would
          # execute here) under a minimal env with no LD_LIBRARY_PATH, using
          # Path containment (not startswith) so <dest>-evil cannot slip by.
          src_prefix="$("$PYBIN" -c 'import sys; print(sys.base_prefix)')"
          env -i PATH=/usr/bin:/bin "$interp" -I -c "
          import sys
          from pathlib import Path
          # Resolve every base: /proc/self/maps paths are kernel-canonical, so
          # a symlinked prefix component would otherwise desync containment.
          src = Path('''$src_prefix''').resolve()
          dest = Path('''$dest/python''').resolve()
          assert Path(sys.base_prefix).resolve() == dest, sys.base_prefix
          maps = [l.split(None, 5)[5].strip() for l in open('/proc/self/maps') if len(l.split(None, 5)) == 6 and l.split(None, 5)[5].startswith('/')]
          escaped = [m for m in maps if Path(m).resolve().is_relative_to(src)]
          assert not escaped, escaped
          libpython = [m for m in maps if 'libpython' in Path(m).name]
          assert libpython, 'expected the shared toolcache libpython to be mapped'
          stray = [m for m in libpython if not Path(m).resolve().is_relative_to(dest)]
          assert not stray, stray
          import yaml
          assert Path(yaml.__file__).resolve().is_relative_to(dest), yaml.__file__
          print('launcher containment OK:', len(maps), 'mappings, libpython =', sorted(set(libpython)))
          "
          # Every planted startup carrier must be gone AND must not have
          # executed during the -I probe above (the marker file is untouched).
          # The canonical stdlib zip (on sys.path even absent) must also be gone.
          test -z "$(find "$dest/python" \( -name '*.pth' -o -name '*._pth' \
            -o -name 'pybuilddir.txt' -o -name 'sitecustomize*' \
            -o -name 'usercustomize*' -o -name 'python3*.zip' \) -print -quit)"
          test ! -e "$RUNNER_TEMP/pth-executed"
          # A hostile LD_LIBRARY_PATH pointing at the source toolcache must NOT
          # win: the relocation pass pins RPATH (which outranks it), so libpython
          # stays inside the runtime AND nothing maps back from the source prefix
          # even here — the same two conditions the production probe enforces.
          env -i PATH=/usr/bin:/bin LD_LIBRARY_PATH="$src_prefix/lib" "$interp" -I -S -c "
          from pathlib import Path
          dest = Path('''$dest/python''').resolve()
          src = Path('''$src_prefix''').resolve()
          maps = [l.split(None, 5)[5].strip() for l in open('/proc/self/maps') if len(l.split(None, 5)) == 6 and l.split(None, 5)[5].startswith('/')]
          assert maps, 'probe observed no maps'
          escaped = [m for m in maps if Path(m).resolve().is_relative_to(src)]
          assert not escaped, ('LD_LIBRARY_PATH pulled code from the source prefix', escaped)
          libpython = [m for m in maps if 'libpython' in Path(m).name]
          assert libpython, 'expected a shared libpython mapping (static would make this probe vacuous)'
          stray = [m for m in libpython if not Path(m).resolve().is_relative_to(dest)]
          assert not stray, ('LD_LIBRARY_PATH outranked the pinned RPATH', stray)
          print('hostile LD_LIBRARY_PATH neutralized:', sorted(set(libpython)))
          "

      - name: Fail-closed paths refuse before copying
        env:
          PYBIN: ${{ steps.py.outputs.python-path }}
        run: |
          set -euo pipefail
          if sudo "$PYBIN" -I -S scripts/provision_verification_supervisor.py \
            --destination "$RUNNER_TEMP/dest-neg" \
            --supervisor "$RUNNER_TEMP/fake-supervisor" \
            --site-packages "$RUNNER_TEMP/staged" \
            --apply-root a --eval-root b --corpus-release-root c \
            --git /usr/bin/git \
            --require-prefix-under /etc 2> "$RUNNER_TEMP/neg.err"; then
            echo "provisioner accepted a prefix outside --require-prefix-under"; exit 1
          fi
          grep -q "not under required parent" "$RUNNER_TEMP/neg.err"
          test ! -e "$RUNNER_TEMP/dest-neg/python"
          if sudo /usr/bin/python3 scripts/provision_verification_supervisor.py \
            --destination "$RUNNER_TEMP/dest-neg2" \
            --supervisor "$RUNNER_TEMP/fake-supervisor" \
            --site-packages "$RUNNER_TEMP/staged" \
            --apply-root a --eval-root b --corpus-release-root c \
            --git /usr/bin/git 2> "$RUNNER_TEMP/neg2.err"; then
            echo "provisioner accepted the system interpreter"; exit 1
          fi
          grep -q "not a self-contained" "$RUNNER_TEMP/neg2.err"
          test ! -e "$RUNNER_TEMP/dest-neg2/python"
