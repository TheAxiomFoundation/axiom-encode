name: Golden regeneration drift check

# Weekly: re-generate a random sample of 3-5 already-merged modules with the
# current encoder and semantic-diff them against what is merged (comments and
# ordering ignored). Any difference opens an issue. This is the check that would
# have caught the 0.2.1187 silent wrong-root immediately.

on:
  schedule:
    # Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      k:
        description: "Number of modules to sample (3-5)"
        required: false
        default: "5"
      dry_run:
        description: "Identity regeneration only (wiring check; never reports drift)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: golden-regeneration
  cancel-in-progress: false

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Checkout axiom-encode
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: axiom-encode
          persist-credentials: false

      # Cross-repo checkout of the merged-module source. GITHUB_TOKEN only
      # reaches this repo; set AXIOM_REPO_TOKEN (a PAT with read on the org) for
      # rulespec-us and axiom-corpus, plus axiom-rules-engine for non-dry runs.
      - name: Checkout rulespec-us
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: TheAxiomFoundation/rulespec-us
          path: rulespec-us
          token: ${{ secrets.AXIOM_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Checkout axiom-corpus
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-corpus
          path: axiom-corpus
          token: ${{ secrets.AXIOM_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Checkout axiom-rules-engine
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-rules-engine
          ref: 38b5f646165f18f64307f1eef226c7a6f2d4936e
          path: axiom-rules-engine
          token: ${{ secrets.AXIOM_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Rust toolchain
        if: ${{ !inputs.dry_run }}
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30

      - name: Build Axiom rules engine
        if: ${{ !inputs.dry_run }}
        working-directory: axiom-rules-engine
        run: |
          cargo build --release --locked
          test -x target/release/axiom-rules-engine

      - name: Install encoder
        working-directory: axiom-encode
        run: uv sync --locked --python 3.13 --extra api

      - name: Validate dry-run wiring
        if: ${{ inputs.dry_run }}
        working-directory: axiom-encode
        env:
          AXIOM_CORPUS_RELEASE_PUBLIC_KEY: ${{ vars.AXIOM_CORPUS_RELEASE_PUBLIC_KEY }}
          AXIOM_CORPUS_ROOT: ${{ github.workspace }}/axiom-corpus
          AXIOM_DRIFT_ROOT: ${{ github.workspace }}/rulespec-us
          DRIFT_SAMPLE_SIZE: ${{ inputs.k || '5' }}
        run: |
          case "$DRIFT_SAMPLE_SIZE" in
            3|4|5) ;;
            *) echo "k must be an integer from 3 through 5" >&2; exit 2 ;;
          esac
          .venv/bin/axiom-encode drift-check \
            --root "$AXIOM_DRIFT_ROOT" --corpus-path "$AXIOM_CORPUS_ROOT" \
            --k "$DRIFT_SAMPLE_SIZE" --dry-run --json

      - name: Run live drift check
        if: ${{ !inputs.dry_run }}
        working-directory: axiom-encode
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AXIOM_CORPUS_RELEASE_PUBLIC_KEY: ${{ vars.AXIOM_CORPUS_RELEASE_PUBLIC_KEY }}
          AXIOM_CORPUS_ROOT: ${{ github.workspace }}/axiom-corpus
          AXIOM_DRIFT_ROOT: ${{ github.workspace }}/rulespec-us
          AXIOM_RULES_ENGINE_ROOT: ${{ github.workspace }}/axiom-rules-engine
          DRIFT_REPORT: ${{ runner.temp }}/golden-drift-report.json
          DRIFT_SAMPLE_SIZE: ${{ inputs.k || '5' }}
        run: |
          case "$DRIFT_SAMPLE_SIZE" in
            3|4|5) ;;
            *) echo "k must be an integer from 3 through 5" >&2; exit 2 ;;
          esac
          set +e
          .venv/bin/axiom-encode drift-check \
            --root "$AXIOM_DRIFT_ROOT" --corpus-path "$AXIOM_CORPUS_ROOT" \
            --axiom-rules-engine-path "$AXIOM_RULES_ENGINE_ROOT" \
            --k "$DRIFT_SAMPLE_SIZE" \
            --regenerate --regenerate-backend openai \
            --report-file "$DRIFT_REPORT" --json
          drift_status=$?
          set -e
          if [ "$drift_status" -gt 1 ]; then
            exit "$drift_status"
          fi
          test -s "$DRIFT_REPORT"

      - name: Upload sanitized drift report
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: golden-drift-report-${{ github.run_id }}
          path: ${{ runner.temp }}/golden-drift-report.json
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  publish:
    needs: drift
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout axiom-encode
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: axiom-encode
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install encoder
        working-directory: axiom-encode
        run: uv sync --locked --python 3.13 --extra api

      - name: Download sanitized drift report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: golden-drift-report-${{ github.run_id }}
          path: drift-report

      - name: Publish drift findings
        working-directory: axiom-encode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .venv/bin/axiom-encode publish-drift-report \
            --report-file "$GITHUB_WORKSPACE/drift-report/golden-drift-report.json" \
            --repo TheAxiomFoundation/axiom-encode --json
