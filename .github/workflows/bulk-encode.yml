name: Bulk worklist pre-classification

# This workflow only routes worklist entries. The former generation lane could
# not bind the signed corpus release or explicit RuleSpec and engine checkouts,
# so the prelaunch hard cut removes it. Generation now runs through the
# corpus-bound encode/eval surfaces that require all dependency roots.

on:
  workflow_dispatch:
    inputs:
      worklist:
        description: "Path to JSON list of canonical corpus_citation_path strings"
        required: false
        default: worklist.json
      country:
        description: "Canonical RuleSpec country checkout"
        required: true
        type: choice
        options:
          - us
          - uk
          - nz
      rulespec_ref:
        description: "Immutable rulespec-<country> commit SHA"
        required: true
      corpus_ref:
        description: "Immutable axiom-corpus commit SHA"
        required: true

concurrency:
  group: bulk-encode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preclassify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check out canonical RuleSpec release consumer
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: TheAxiomFoundation/rulespec-${{ inputs.country }}
          ref: ${{ inputs.rulespec_ref }}
          path: external/rulespec
          persist-credentials: false

      - name: Check out immutable corpus release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-corpus
          ref: ${{ inputs.corpus_ref }}
          path: external/axiom-corpus
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: Set up Go 1.26.1
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Set up Python
        run: uv python install 3.13

      - name: Install
        run: |
          uv sync --locked --python 3.13 --extra api
          rm -rf "$RUNNER_TEMP/axiom-verification-site-packages"
          uv pip install --python .venv/bin/python \
            --target "$RUNNER_TEMP/axiom-verification-site-packages" ".[api]"

      - name: Provision protected verification supervisor
        env:
          TRUST_APPLY_ROOT: ${{ vars.AXIOM_ENCODE_APPLY_SIGNING_PUBLIC_KEY }}
          TRUST_EVAL_ROOT: ${{ vars.AXIOM_ENCODE_EVAL_SIGNING_PUBLIC_KEY }}
          TRUST_CORPUS_RELEASE_ROOT: ${{ vars.AXIOM_CORPUS_RELEASE_PUBLIC_KEY }}
          TRUST_RETIRED_CORPUS_RELEASE_ROOT: ${{ vars.AXIOM_CORPUS_RELEASE_RETIRED_PUBLIC_KEY }}
        run: |
          CGO_ENABLED=0 go build -trimpath -buildvcs=false -ldflags='-buildid=' \
            -o "$RUNNER_TEMP/axiom-encode-signing-supervisor" \
            ./cmd/axiom-encode-signing-supervisor
          sudo rm -rf /opt/axiom-verification
          sudo .venv/bin/python scripts/provision_verification_supervisor.py \
            --destination /opt/axiom-verification \
            --supervisor "$RUNNER_TEMP/axiom-encode-signing-supervisor" \
            --site-packages "$RUNNER_TEMP/axiom-verification-site-packages" \
            --apply-root "$TRUST_APPLY_ROOT" --eval-root "$TRUST_EVAL_ROOT" \
            --corpus-release-root "$TRUST_CORPUS_RELEASE_ROOT" \
            --retired-corpus-release-root "$TRUST_RETIRED_CORPUS_RELEASE_ROOT" \
            --git /usr/bin/git
          sudo chown -R 0:0 /opt/axiom-verification
          sudo chmod -R go-w /opt/axiom-verification

      - name: Pre-classify the worklist (cheap pre-step, before generation)
        env:
          # Judges (and the ambiguous-entry arbiter) run cross-family on Claude.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          /opt/axiom-verification/axiom-encode-signing-supervisor \
            --trusted-signing-roots /opt/axiom-verification/signing-trust-roots.json \
            --trusted-python-runtime-root /opt/axiom-verification/python \
            --trusted-python-import-root /opt/axiom-verification/python/lib/python3.13/site-packages \
            --trusted-python-package-root /opt/axiom-verification/python/lib/python3.13/site-packages/axiom_encode \
            -- /opt/axiom-verification/axiom-encode preclassify \
            --worklist "${{ inputs.worklist }}" \
            --root external/rulespec \
            --corpus-path external/axiom-corpus \
            --json > preclassify.json
          .venv/bin/python - <<'PY'
          import json
          data = json.load(open("preclassify.json"))
          gen = data["generate"]
          print(f"generate={gen} skip={data['skip']} total={data['total']}")
          # Route generate-routed entries to a downstream generation manifest.
          keep = [r for r in data["results"] if r["route"] == "generate"]
          json.dump(keep, open("generate_worklist.json", "w"), indent=2)
          # Skipped entries are recorded with a reason — never silently dropped.
          for r in data["results"]:
              if r["route"] == "skip":
                  print(f"SKIP {r['classification']}: {r['entry_ref']} :: {r['reason']}")
          PY

      - name: Upload routing artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: preclassify-routing
          path: |
            preclassify.json
            generate_worklist.json
