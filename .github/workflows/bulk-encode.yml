name: Bulk worklist pre-classification

# This workflow only routes worklist entries. The former generation lane could
# not bind the signed corpus release or explicit RuleSpec and engine checkouts,
# so the prelaunch hard cut removes it. Generation now runs through the
# corpus-bound encode/eval surfaces that require all dependency roots.

on:
  workflow_dispatch:
    inputs:
      worklist:
        description: "Path to JSON list of canonical corpus_citation_path strings"
        required: false
        default: worklist.json
      country:
        description: "Canonical RuleSpec country checkout"
        required: true
        type: choice
        options:
          - us
          - uk
          - nz
      rulespec_ref:
        description: "Immutable rulespec-<country> commit SHA"
        required: true
      corpus_ref:
        description: "Immutable axiom-corpus commit SHA"
        required: true

concurrency:
  group: bulk-encode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preclassify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check out canonical RuleSpec release consumer
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: TheAxiomFoundation/rulespec-${{ inputs.country }}
          ref: ${{ inputs.rulespec_ref }}
          path: external/rulespec
          persist-credentials: false

      - name: Check out immutable corpus release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-corpus
          ref: ${{ inputs.corpus_ref }}
          path: external/axiom-corpus
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install
        run: uv sync --locked --python 3.13 --extra api

      - name: Pre-classify the worklist (cheap pre-step, before generation)
        env:
          # Judges (and the ambiguous-entry arbiter) run cross-family on Claude.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AXIOM_CORPUS_RELEASE_PUBLIC_KEY: ${{ secrets.AXIOM_CORPUS_RELEASE_PUBLIC_KEY }}
        run: |
          .venv/bin/axiom-encode preclassify \
            --worklist "${{ inputs.worklist }}" \
            --root external/rulespec \
            --corpus-path external/axiom-corpus \
            --json > preclassify.json
          .venv/bin/python - <<'PY'
          import json
          data = json.load(open("preclassify.json"))
          gen = data["generate"]
          print(f"generate={gen} skip={data['skip']} total={data['total']}")
          # Route generate-routed entries to a downstream generation manifest.
          keep = [r for r in data["results"] if r["route"] == "generate"]
          json.dump(keep, open("generate_worklist.json", "w"), indent=2)
          # Skipped entries are recorded with a reason — never silently dropped.
          for r in data["results"]:
              if r["route"] == "skip":
                  print(f"SKIP {r['classification']}: {r['entry_ref']} :: {r['reason']}")
          PY

      - name: Upload routing artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: preclassify-routing
          path: |
            preclassify.json
            generate_worklist.json
